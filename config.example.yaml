target_mbps: 100

speed_test:
  interval_hours: 3
  soft_threshold: 0.5      # postpone if current use > 50% of target
  hard_threshold: 0.85     # skip if current use > 85% of target
  postpone_retry_minutes: 15
  max_postpones: 3
  cli_path: speedtest   # full path to exe, or just "speedtest" if it's on PATH

connectivity:
  ping_interval_seconds: 45
  outage_threshold_failures: 3   # consecutive failures before declaring outage
  degraded_loss_threshold_pct: 5 # record a degraded period when loss >= this %
  degraded_window_minutes: 10    # ...sustained over windows of this size
  ping_targets:
    - 1.1.1.1
    - 8.8.8.8
    - gateway              # resolved at runtime by the pinger

database:
  url: postgresql://netmon:yourpassword@localhost:5432/netmon

dashboard:
  host: 127.0.0.1
  port: 5000

# Optional: identity lines printed in the ISP evidence report header.
# Leave out (or blank) to get fill-in-by-hand lines instead.
# report:
#   customer_name: ""
#   account_number: ""
#   isp_name: ""
#   plan_name: ""     # e.g. "Fiber 100"

logging:
  level: INFO
  file: netmon.log
  max_bytes: 10485760   # 10 MB per file
  backup_count: 5       # keep last 5 rotated files (~50 MB total)
